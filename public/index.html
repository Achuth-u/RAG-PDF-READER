<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI PDF RAG Chatbot</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101418;
        color: #eef5f1;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100% - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.75rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 18px;
        color: #b7c7c0;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      code {
        display: block;
        overflow-x: auto;
        padding: 16px;
        border: 1px solid #2d3735;
        border-radius: 8px;
        background: #171e22;
        color: #9be7d1;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI PDF RAG Chatbot</h1>
      <p>
        This repository contains a Streamlit RAG app. Vercel can serve this
        fallback page, but the full app needs a Streamlit-compatible host with a
        reachable Ollama service.
      </p>
      <code>streamlit run app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true</code>
    </main>
  </body>
</html>
